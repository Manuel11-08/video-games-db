id: estilo_buscador
label: 'Estilo buscador'
code: |-
  /* =========================================
     1. BUSCADOR SUPERIOR
     ========================================= */
  form[id^="views-exposed-form"] {
      background-color: #ffffff !important;
      padding: 24px !important;
      border-radius: 12px !important;
      border: 1px solid #e5e7eb !important;
      margin-bottom: 30px !important;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08) !important;
  }
  form[id^="views-exposed-form"] .form--inline {
      display: flex !important;
      flex-wrap: wrap !important;
      gap: 15px !important;
      align-items: flex-end !important;
  }

  /* =========================================
     2. FILTROS LATERALES (FACETAS)
     ========================================= */
  .block-facets {
      background-color: #ffffff !important;
      border: 1px solid #e5e7eb !important;
      border-radius: 12px !important;
      padding: 20px !important;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08) !important;
      margin-bottom: 20px !important;
  }
  .block-facets ul { list-style: none !important; padding-left: 0 !important; margin: 0 !important; }
  .block-facets li { margin-bottom: 10px !important; }

  /* =========================================
     3. LAS TARJETAS DE LOS JUEGOS
     ========================================= */
  .view-content .views-row,
  .views-view-grid .views-col,
  .views-view-grid .views-row {
      background-color: #ffffff !important;
      border: 1px solid #e5e7eb !important;
      border-radius: 12px !important;
      padding: 25px !important;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08) !important;
      transition: all 0.3s ease !important;
      margin-bottom: 20px !important;
      box-sizing: border-box !important;
  }

  /* Efecto al pasar el ratón */
  .view-content .views-row:hover,
  .views-view-grid .views-col:hover,
  .views-view-grid .views-row:hover {
      transform: translateY(-5px) !important;
      box-shadow: 0 10px 15px rgba(0,0,0,0.12) !important;
      border-color: #3b82f6 !important;
  }

  /* Título del juego */
  .view-content .views-row a,
  .views-view-grid .views-col a,
  .views-view-grid .views-row a {
      font-size: 1.25rem !important;
      font-weight: 800 !important;
      color: #1f2937 !important;
      text-decoration: none !important;
      display: block !important;
      margin-bottom: 12px !important;
  }

  .view-content .views-row a:hover,
  .views-view-grid .views-col a:hover,
  .views-view-grid .views-row a:hover {
      color: #2563eb !important;
  }

  /* Precio en verde */
  .view-content .views-row .views-field-used-price,
  .views-view-grid .views-col .views-field-used-price,
  .views-view-grid .views-row .views-field-used-price {
      font-size: 1.5rem !important;
      font-weight: 900 !important;
      color: #10b981 !important;
      margin-top: 15px !important;
      display: inline-block !important;
  }
media: all
